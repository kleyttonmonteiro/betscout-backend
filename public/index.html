<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0C110E">
<title>Sinais de Gol</title>
<link rel="manifest" href="manifest.json">
<style>
  :root{
    --bg:#0C110E; --surface:#141B16; --line:#24312A;
    --text:#EDF3EE; --muted:#93A69A;
    --verde:#33D374; --amarelo:#F5B63F; --vermelho:#F05C5C;
    --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased}
  body{padding-bottom:calc(72px + env(safe-area-inset-bottom))}

  /* Cabeçalho */
  header{position:sticky;top:0;z-index:5;background:rgba(12,17,14,.92);
    backdrop-filter:blur(8px);border-bottom:1px solid var(--line);
    padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
  header h1{font-size:17px;font-weight:800;letter-spacing:.02em}
  header h1 span{color:var(--verde)}
  #status{font-size:11px;color:var(--muted);text-align:right;line-height:1.4}
  #status .dot{display:inline-block;width:7px;height:7px;border-radius:50%;
    background:var(--verde);margin-right:5px;animation:pulse 2s infinite}
  @keyframes pulse{50%{opacity:.35}}
  @media (prefers-reduced-motion: reduce){#status .dot,.min{animation:none!important}}

  main{padding:14px 14px 0;max-width:560px;margin:0 auto}
  .tab{display:none}
  .tab.on{display:block}

  /* Card de jogo — placar estilo estádio */
  .card{background:var(--surface);border:1px solid var(--line);
    border-radius:var(--radius);padding:14px;margin-bottom:12px}
  .liga{font-size:10px;text-transform:uppercase;letter-spacing:.14em;
    color:var(--muted);margin-bottom:10px;display:flex;justify-content:space-between}
  .placar{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;
    align-items:center;text-align:center}
  .time{font-size:14px;font-weight:600;line-height:1.3}
  .gols{font-size:34px;font-weight:800;font-variant-numeric:tabular-nums;
    letter-spacing:.04em}
  .meta{display:flex;gap:8px;justify-content:center;margin-top:10px;flex-wrap:wrap}
  .chip{font-size:11px;font-weight:700;padding:4px 10px;border-radius:99px;
    border:1px solid var(--line);color:var(--muted)}
  .chip.min{color:var(--verde);border-color:var(--verde);animation:pulse 2s infinite}
  .chip.fav{color:var(--amarelo);border-color:transparent;background:rgba(245,182,63,.12)}
  .sem{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:1px}
  .sem.verde{background:var(--verde)} .sem.amarelo{background:var(--amarelo)} .sem.vermelho{background:var(--vermelho)}

  .btn{display:block;width:100%;margin-top:12px;padding:13px;border:0;
    border-radius:11px;background:var(--verde);color:#07130B;font-size:15px;
    font-weight:800;cursor:pointer}
  .btn:disabled{opacity:.5}
  .btn.sec{background:transparent;color:var(--verde);border:1px solid var(--verde)}

  /* Resultado da análise */
  .analise{margin-top:12px;border-top:1px dashed var(--line);padding-top:12px;font-size:13px}
  .analise .veredito{font-size:15px;font-weight:800;margin-bottom:6px}
  .analise .linha-dados{display:flex;gap:14px;color:var(--muted);margin-bottom:8px;
    font-variant-numeric:tabular-nums;flex-wrap:wrap}
  .analise .just{line-height:1.5}

  /* Entradas */
  .entrada{display:flex;justify-content:space-between;gap:10px;align-items:center}
  .badge{font-size:11px;font-weight:800;padding:4px 10px;border-radius:99px}
  .badge.GREEN{background:rgba(51,211,116,.15);color:var(--verde)}
  .badge.RED{background:rgba(240,92,92,.15);color:var(--vermelho)}
  .badge.PENDENTE{background:rgba(245,182,63,.15);color:var(--amarelo)}

  /* Log */
  .logline{font-family:ui-monospace,Menlo,monospace;font-size:11px;
    color:var(--muted);padding:6px 0;border-bottom:1px solid var(--line);word-break:break-word}
  .logline.error{color:var(--vermelho)}

  .vazio{color:var(--muted);text-align:center;padding:48px 20px;font-size:14px;line-height:1.6}

  /* Navegação inferior (polegar) */
  nav{position:fixed;bottom:0;left:0;right:0;z-index:5;display:flex;
    background:rgba(12,17,14,.96);backdrop-filter:blur(8px);
    border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom)}
  nav button{flex:1;padding:14px 0 12px;background:none;border:0;color:var(--muted);
    font-size:12px;font-weight:700;cursor:pointer}
  nav button.on{color:var(--verde)}
</style>
</head>
<body>

<header>
  <h1>Sinais<span>&nbsp;de&nbsp;Gol</span></h1>
  <div id="status"><span class="dot"></span><span id="status-txt">carregando…</span></div>
</header>

<main>
  <section id="tab-jogos" class="tab on">
    <div id="lista-jogos"><div class="vazio">Buscando jogos ao vivo…</div></div>
  </section>

  <section id="tab-entradas" class="tab">
    <button class="btn sec" id="btn-resolver" style="margin:0 0 12px">Resolver GREEN / RED</button>
    <div id="lista-entradas"><div class="vazio">Nenhuma entrada registrada ainda.</div></div>
  </section>

  <section id="tab-log" class="tab">
    <div id="lista-log"><div class="vazio">Sem eventos no log.</div></div>
  </section>
</main>

<nav>
  <button data-tab="jogos" class="on">Jogos</button>
  <button data-tab="entradas">Entradas</button>
  <button data-tab="log">Log</button>
</nav>

<script>
(() => {
  const REFRESH_MS = 3 * 60 * 1000; // atualização a cada 3 minutos
  const $ = s => document.querySelector(s);
  const analises = {}; // fixtureId -> análise recebida
  let jogos = [];

  /* ---------- Navegação ---------- */
  document.querySelectorAll('nav button').forEach(b => b.addEventListener('click', () => {
    document.querySelectorAll('nav button').forEach(x => x.classList.toggle('on', x === b));
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('on', t.id === 'tab-' + b.dataset.tab));
    if (b.dataset.tab === 'entradas') carregarEntradas();
    if (b.dataset.tab === 'log') carregarLog();
  }));

  /* ---------- Utilitários ---------- */
  const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  async function api(path, opts) {
    const res = await fetch(path, opts);
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.erro || res.status);
    return data;
  }
  const hora = iso => new Date(iso || Date.now()).toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});

  /* ---------- Jogos ---------- */
  async function carregarJogos(silencioso) {
    try {
      if (!silencioso) $('#status-txt').textContent = 'atualizando…';
      const data = await api('/api/games');
      jogos = data.jogos || [];
      $('#status-txt').textContent = jogos.length + ' jogo(s) · ' + hora(data.atualizado_em);
      renderJogos();
    } catch (e) {
      $('#status-txt').textContent = 'falha ao atualizar';
    }
  }

  function renderJogos() {
    const el = $('#lista-jogos');
    if (!jogos.length) {
      el.innerHTML = '<div class="vazio">Nenhum jogo dentro das regras agora.<br>Cenários: 0x0 · favorito perdendo 0x1 · 1x1<br>Janelas: 1ºT 30\'+ · 2ºT 70\'+</div>';
      return;
    }
    el.innerHTML = jogos.map(j => {
      const [gh, ga] = j.placar.split('x');
      const fav = j.favorito && j.favorito.forte
        ? `<span class="chip fav">FAV ${j.favorito.lado === 'home' ? esc(j.casa) : esc(j.fora)} @${j.favorito.odd}</span>` : '';
      const a = analises[j.fixtureId];
      return `<article class="card" data-id="${j.fixtureId}">
        <div class="liga"><span>${esc(j.liga)}</span><span>${esc(j.cenario)}</span></div>
        <div class="placar">
          <div class="time">${esc(j.casa)}</div>
          <div class="gols">${esc(gh)}&thinsp;–&thinsp;${esc(ga)}</div>
          <div class="time">${esc(j.fora)}</div>
        </div>
        <div class="meta">
          <span class="chip min">${j.minuto}' · ${j.tempo}ºT</span>
          <span class="chip">${j.linhas.join(' / ')}</span>
          ${fav}
        </div>
        <div class="analise-slot">${a ? htmlAnalise(a) : ''}</div>
        <button class="btn" data-analisar="${j.fixtureId}" ${a ? 'hidden' : ''}>Analisar com IA</button>
      </article>`;
    }).join('');
  }

  function htmlAnalise(a) {
    const cor = a.veredito === 'ENTRAR' ? 'var(--verde)' : a.veredito === 'EVITAR' ? 'var(--vermelho)' : 'var(--amarelo)';
    return `<div class="analise">
      <div class="veredito" style="color:${cor}"><span class="sem ${esc(a.semaforo)}"></span>${esc(a.veredito)} · ${esc(a.linha_sugerida || '')}</div>
      <div class="linha-dados">
        <span>Prob. ${esc(a.probabilidade)}%</span>
        <span>Risco ${esc(a.risco)}</span>
        <span>Odd mín. ${esc(a.odd_minima)}</span>
      </div>
      <div class="just">${esc(a.justificativa)}</div>
      <button class="btn sec" data-registrar="${a.fixtureId}">Registrar entrada + Telegram</button>
    </div>`;
  }

  /* ---------- Ações nos cards (delegação) ---------- */
  $('#lista-jogos').addEventListener('click', async e => {
    const btnA = e.target.closest('[data-analisar]');
    const btnR = e.target.closest('[data-registrar]');

    if (btnA) {
      const id = btnA.dataset.analisar;
      btnA.disabled = true; btnA.textContent = 'Analisando…';
      try {
        analises[id] = await api('/api/analyze', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ fixtureId: Number(id) })
        });
        renderJogos();
      } catch (err) {
        btnA.disabled = false; btnA.textContent = 'Analisar com IA';
        alert('Análise falhou: ' + err.message);
      }
    }

    if (btnR) {
      const a = analises[btnR.dataset.registrar];
      if (!a) return;
      btnR.disabled = true; btnR.textContent = 'Registrando…';
      try {
        const r = await api('/api/entries', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({
            fixtureId: a.fixtureId, jogo: a.jogo, minuto: a.minuto, cenario: a.cenario,
            linha: a.linha_sugerida, probabilidade: a.probabilidade, risco: a.risco,
            odd_minima: a.odd_minima, justificativa: a.justificativa
          })
        });
        btnR.textContent = r.telegram ? 'Registrada ✓ Telegram enviado' : 'Registrada ✓';
      } catch (err) {
        btnR.disabled = false; btnR.textContent = 'Registrar entrada + Telegram';
        alert('Falha ao registrar: ' + err.message);
      }
    }
  });

  /* ---------- Entradas ---------- */
  async function carregarEntradas() {
    try {
      const entradas = await api('/api/entries');
      const el = $('#lista-entradas');
      if (!entradas.length) return; // mantém estado vazio
      el.innerHTML = entradas.map(e => `<div class="card entrada">
        <div>
          <div style="font-weight:700;font-size:14px">${esc(e.jogo)}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:3px">
            ${esc(e.linha)} · ${e.minuto}' · ${esc(e.cenario)}${e.placar_final ? ' · final ' + esc(e.placar_final) : ''}
          </div>
        </div>
        <span class="badge ${esc(e.status)}">${esc(e.status)}</span>
      </div>`).join('');
    } catch {}
  }
  $('#btn-resolver').addEventListener('click', async e => {
    e.target.disabled = true; e.target.textContent = 'Resolvendo…';
    try { await api('/api/entries/resolve', { method:'POST' }); await carregarEntradas(); }
    finally { e.target.disabled = false; e.target.textContent = 'Resolver GREEN / RED'; }
  });

  /* ---------- Log ---------- */
  async function carregarLog() {
    try {
      const linhas = await api('/api/log');
      if (!linhas.length) return;
      $('#lista-log').innerHTML = linhas.map(l =>
        `<div class="logline ${l.level === 'error' ? 'error' : ''}">${hora(l.ts)} ${esc(l.msg)}</div>`
      ).join('');
    } catch {}
  }

  /* ---------- Início + atualização em segundo plano ---------- */
  carregarJogos();
  setInterval(() => carregarJogos(true), REFRESH_MS);
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) carregarJogos(true); // volta ao app → atualiza
  });
})();
</script>
</body>
</html>
